name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false  # Never cancel a release mid-flight

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  SOLUTION: BuildTimeAnalyzer.slnx
  TUI_PROJECT: src/BuildTimeAnalyzer.TUI/BuildTimeAnalyzer.TUI.csproj

jobs:
  # Gate: tests must pass before any artifacts are built or released
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --configuration Release --no-restore

      - name: Test
        run: dotnet test ${{ env.SOLUTION }} --configuration Release --no-build

  # Build AOT binaries per platform — each target on its native OS (no cross-compile)
  build:
    name: Build ${{ matrix.rid }}
    needs: test
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            archive: tar
          - os: ubuntu-24.04-arm
            rid: linux-arm64
            archive: tar
          - os: windows-latest
            rid: win-x64
            archive: zip
          - os: macos-latest
            rid: osx-arm64
            archive: tar

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-${{ matrix.rid }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.rid }}-nuget-
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ${{ env.TUI_PROJECT }} --runtime ${{ matrix.rid }}

      - name: Publish (Native AOT, self-contained)
        run: >-
          dotnet publish ${{ env.TUI_PROJECT }}
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          --no-restore
          --output ./publish

      - name: Set archive name
        id: names
        shell: bash
        run: |
          base="btanalyzer-${{ matrix.rid }}-${{ github.ref_name }}"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            echo "archive=$base.zip" >> "$GITHUB_OUTPUT"
          else
            echo "archive=$base.tar.gz" >> "$GITHUB_OUTPUT"
          fi
          echo "base=$base" >> "$GITHUB_OUTPUT"

      - name: Archive (tar.gz)
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          tar -czf "${{ steps.names.outputs.archive }}" -C ./publish .

      - name: Archive (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path ./publish/* -DestinationPath "${{ steps.names.outputs.archive }}"

      - name: Generate SHA256 checksum
        shell: bash
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ steps.names.outputs.archive }}" > "${{ steps.names.outputs.archive }}.sha256"
          else
            shasum -a 256 "${{ steps.names.outputs.archive }}" > "${{ steps.names.outputs.archive }}.sha256"
          fi
          cat "${{ steps.names.outputs.archive }}.sha256"

      - name: Verify archive contains the executable
        shell: bash
        run: |
          if [ "${{ matrix.archive }}" = "zip" ]; then
            python -c "import zipfile,sys; z=zipfile.ZipFile('${{ steps.names.outputs.archive }}'); names=z.namelist(); sys.exit(0 if any('btanalyzer' in n for n in names) else 1)"
          else
            tar -tzf "${{ steps.names.outputs.archive }}" | grep -q 'btanalyzer'
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.names.outputs.base }}
          path: |
            ${{ steps.names.outputs.archive }}
            ${{ steps.names.outputs.archive }}.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la ./artifacts

      - name: Generate combined SHA256SUMS
        run: |
          cd ./artifacts
          sha256sum *.tar.gz *.zip 2>/dev/null > SHA256SUMS || true
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ./artifacts/*.tar.gz
            ./artifacts/*.zip
            ./artifacts/*.sha256
            ./artifacts/SHA256SUMS
